version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: pokemon-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: pokemon_stadium
    volumes:
      - mongodb_data:/data/db
    networks:
      - pokemon-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: pokemon-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/pokemon_stadium?authSource=admin
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pokemon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  mongodb_data:
    driver: local

networks:
  pokemon-network:
    driver: bridge
